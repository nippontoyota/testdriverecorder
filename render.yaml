services:
  - type: web
    name: testdrive-recorder
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false   # set this manually in Render dashboard → your Supabase connection string
      - key: JWT_SECRET
        generateValue: true
